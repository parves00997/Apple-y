            </p>

    <div id="infoModal" class="modal">

                <p>🔒 আপনার তথ্য সুরক্ষিত। শুধুমাত্র বিজ্ঞাপন দেখে কন্টেন্ট আনলক করুন।</p>

<script>
    // টেলিগ্রাম মিনি অ্যাপ
    let tg = window.Telegram?.WebApp;
    if(tg) {
        tg.expand();
        tg.ready();
        console.log("টেলিগ্রাম মিনি অ্যাপ রেডি");
    }
    
    // ======================= লিংক রাউন্ড রবিন =======================
    const TRAFFIC_LINKS = [
        "https://all-video-hub.pages.dev/",
        "https://omg10.com/4/9429975",
        "https://omg10.com/4/9717825"
    ];
    
    let linkIndex = 0;
    try {
        const saved = sessionStorage.getItem('traffic_link_index');
        if(saved !== null) linkIndex = parseInt(saved) % TRAFFIC_LINKS.length;
    } catch(e) {}
    
    function getNextTrafficLink() {
        const link = TRAFFIC_LINKS[linkIndex % TRAFFIC_LINKS.length];
        linkIndex++;
        try { sessionStorage.setItem('traffic_link_index', linkIndex); } catch(e) {}
        return link;
    }
    
    const thumbnailLinks = [
        "https://i.ibb.co.com/M5sn0X7J/1775956953020.jpg",
        "https://i.ibb.co.com/kr3rBRR/IMG-20260330-213725-843.jpg",
        "https://i.ibb.co.com/x8HNBFTy/IMG-20260126-164724-422.jpg",
        "https://i.ibb.co.com/1Ybszq1Q/IMG-20260114-223941-811.jpg",
        "https://i.ibb.co.com/QFQRYfZD/IMG-20260427-200108-861.jpg"
    ];
    
    const videoItems = [
        { id:1, title:"🎬 প্রিমিয়াম ভিডিও ১", thumbUrl: thumbnailLinks[0] },
        { id:2, title:"🎥 প্রিমিয়াম ভিডিও ২", thumbUrl: thumbnailLinks[1] },
        { id:3, title:"📽️ এক্সক্লুসিভ কন্টেন্ট", thumbUrl: thumbnailLinks[2] },
        { id:4, title:"🔥 স্পেশাল ভিডিও", thumbUrl: thumbnailLinks[3] },
        { id:5, title:"⭐ আল্টিমেট এডিশন", thumbUrl: thumbnailLinks[4] },
        { id:6, title:"🎞️ ট্রেন্ডিং নাও", thumbUrl: thumbnailLinks[0] }
    ];
    
    function getVideoLink(videoId) { return getNextTrafficLink(); }
    
    const ADSGRAM_BLOCK_ID = "int-29874";
    let mainAdController = null;
    
    function initAdsgramController(blockId) {
        if (!window.Adsgram) return null;
        try {
            return window.Adsgram.init({ blockId: blockId, debug: false, debugBannerType: "RewardedVideo" });
        } catch(e) { console.error(e); return null; }
    }
    
    async function showAd(controller, onSuccess, onError) {
        if (!controller) { if(onError) onError("AdController not initialized"); return false; }
        const loadingNotif = showLoadingNotification("🎬 এড লোড হচ্ছে...");
        try {
            const result = await controller.show();
            hideLoadingNotification(loadingNotif);
            if (result && result.done === true) {
                if(onSuccess) onSuccess();
                return true;
            } else {
                showNotification("⚠️ সম্পূর্ণ এড দেখুন! স্কিপ করবেন না।", false);
                if(onError) onError("not completed");
                return false;
            }
        } catch (error) {
            hideLoadingNotification(loadingNotif);
            showNotification("❌ বিজ্ঞাপন লোড হয়নি! আবার চেষ্টা করুন।", false);
            if(onError) onError(error);
            return false;
        }
    }
    
    function showLoadingNotification(msg) {
        const existing = document.querySelector('.loading-notification');
        if(existing) existing.remove();
        const div = document.createElement('div');
        div.className = 'loading-notification';
        div.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${msg}<br><span style="font-size:0.75rem;">দয়া করে অপেক্ষা করুন</span>`;
        document.body.appendChild(div);
        return div;
    }
    function hideLoadingNotification(notif) { if(notif && notif.remove) notif.remove(); else document.querySelector('.loading-notification')?.remove(); }
    function showNotification(msg, isSuccess = true) { if(tg) tg.showAlert(msg); else alert(msg); }
    
    // ======================= আনলক মেকানিজম =======================
    let buttonStates = new Map();
    function getButtonState(videoId, btnType) {
        const key = `${videoId}_${btnType}`;
        if(!buttonStates.has(key)) buttonStates.set(key, { current: 0, required: 2, unlocked: false });
        return buttonStates.get(key);
    }
    function updateButtonUI(btn, state) {
        if(!btn) return;
        const span = btn.querySelector('.unlock-counter');
        if(span) span.innerHTML = `🔓 ${state.current}/${state.required}`;
        if(state.unlocked) {
            btn.classList.remove('locked'); btn.classList.add('unlocked');
            btn.disabled = false;
        } else {
            btn.classList.remove('unlocked'); btn.classList.add('locked');
            btn.disabled = false;
        }
    }
    function incrementAndCheck(videoId, btnType, btnElem) {
        const state = getButtonState(videoId, btnType);
        if(state.unlocked) return true;
        state.current++;
        updateButtonUI(btnElem, state);
        if(state.current >= state.required) {
            state.unlocked = true;
            updateButtonUI(btnElem, state);
            showNotification(`✅ বাটন আনলক! এখন ব্যবহার করতে পারেন।`, true);
            return true;
        } else {
            showNotification(`📢 ${state.current}/${state.required} এড দেখেছেন। আরও ${state.required - state.current} টি দেখুন।`, true);
            return false;
        }
    }
    async function showAdForUnlock(videoId, btnType, btnElem, onComplete) {
        if (!mainAdController) mainAdController = initAdsgramController(ADSGRAM_BLOCK_ID);
        if (!mainAdController) { showNotification("বিজ্ঞাপন সিস্টেম প্রস্তুত নয়!", false); return false; }
        return await showAd(mainAdController, () => {
            const unlocked = incrementAndCheck(videoId, btnType, btnElem);
            if(onComplete) onComplete(unlocked);
        }, () => { if(onComplete) onComplete(false); });
    }
    function performAction(videoId, btnType, btnElem, actionCb) {
        const state = getButtonState(videoId, btnType);
        if(state.unlocked) actionCb();
        else showAdForUnlock(videoId, btnType, btnElem, (ok) => { if(ok) actionCb(); });
    }
    
    function handleDownload(videoId, btn) {
        performAction(videoId, 'download', btn, () => { window.open(getVideoLink(videoId), '_blank'); showNotification("🔗 রিডাইরেক্ট হচ্ছে...", true); });
    }
    function handleWatch(videoId, btn) {
        performAction(videoId, 'watch', btn, () => { window.open(getVideoLink(videoId), '_blank'); showNotification("🎥 ভিডিও পেজে যাচ্ছেন...", true); });
    }
    function onPlayIconClick(videoId) {
        const state = getButtonState(videoId, 'watch');
        if(state.unlocked) window.open(getVideoLink(videoId), '_blank');
        else showNotification("⚠️ 'ওয়াচ নাও' বাটনটি প্রথমে আনলক করুন!", false);
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function createButtonHTML(item, type, icon, label) {
        const state = getButtonState(item.id, type);
        const btnClass = state.unlocked ? 'unlocked' : 'locked';
        const colorClass = type === 'download' ? 'btn-download' : 'btn-watch';
        return `<button class="btn ${colorClass} ${btnClass}" data-video-id="${item.id}" data-btn-type="${type}"><i class="fas ${icon}"></i> ${label}<span class="unlock-counter">🔓 ${state.current}/${state.required}</span></button>`;
    }
    
    function buildCarouselAndGrid() {
        const track = document.getElementById('carouselTrack');
        track.innerHTML = '';
        videoItems.forEach(item => {
            const slide = document.createElement('div'); slide.className = 'carousel-slide';
            slide.innerHTML = `<div class="thumb-video-card"><div class="thumb-wrapper" data-video-id="${item.id}"><img class="thumb-img" src="${item.thumbUrl}" alt="thumb" onerror="this.src='https://placehold.co/400x225?text=No+Image'"><div class="play-overlay"><i class="fas fa-play-circle"></i></div></div><div class="card-info"><div class="video-title"><i class="fas fa-crown" style="font-size:0.8rem;"></i> ${escapeHtml(item.title)}</div><div class="button-group">${createButtonHTML(item, 'download', 'fa-download', 'ডাউনলোড')}${createButtonHTML(item, 'watch', 'fa-play', 'ওয়াচ নাও')}</div></div></div>`;
            track.appendChild(slide);
        });
        const grid = document.getElementById('videoGridContainer');
        grid.innerHTML = '';
        videoItems.forEach(item => {
            const card = document.createElement('div'); card.className = 'video-card';
            card.innerHTML = `<div class="thumb-wrapper" data-video-id="${item.id}"><img class="thumb-img" src="${item.thumbUrl}" onerror="this.src='https://placehold.co/400x225?text=No+Image'"><div class="play-overlay"><i class="fas fa-play-circle"></i></div></div><div class="card-body"><div class="card-title"><i class="fas fa-star" style="color:#ffaa44;"></i> ${escapeHtml(item.title)}</div><div class="btn-group">${createButtonHTML(item, 'download', 'fa-download', 'ডাউনলোড')}${createButtonHTML(item, 'watch', 'fa-eye', 'ওয়াচ নাও')}</div></div>`;
            grid.appendChild(card);
        });
        attachEventListeners();
    }
    
    function attachEventListeners() {
        document.querySelectorAll('.btn-download, .btn-watch').forEach(btn => {
            btn.removeEventListener('click', handleBtnClick);
            btn.addEventListener('click', handleBtnClick);
        });
        document.querySelectorAll('.thumb-wrapper').forEach(wrapper => {
            const vid = parseInt(wrapper.getAttribute('data-video-id'));
            wrapper.removeEventListener('click', (e) => {});
            wrapper.addEventListener('click', (e) => { e.stopPropagation(); onPlayIconClick(vid); });
        });
    }
    function handleBtnClick(e) {
        e.stopPropagation();
        const btn = e.currentTarget;
        const videoId = parseInt(btn.getAttribute('data-video-id'));
        const type = btn.getAttribute('data-btn-type');
        if(type === 'download') handleDownload(videoId, btn);
        else if(type === 'watch') handleWatch(videoId, btn);
    }
    
    // স্লাইডার লজিক
    let currentSlide = 0, autoInterval;
    const totalSlides = videoItems.length;
    function buildDotsAndSlider() {
        const dotsDiv = document.getElementById('carouselDots'); dotsDiv.innerHTML = '';
        for(let i=0;i<totalSlides;i++) {
            const dot = document.createElement('div'); dot.classList.add('dot');
            if(i===currentSlide) dot.classList.add('active');
            dot.addEventListener('click', () => { goToSlide(i); resetAuto(); });
            dotsDiv.appendChild(dot);
        }
        goToSlide(0); startAuto();
    }
    function goToSlide(idx) { if(idx<0) idx=0; if(idx>=totalSlides) idx=totalSlides-1; currentSlide=idx; document.getElementById('carouselTrack').style.transform = `translateX(-${currentSlide*100}%)`; document.querySelectorAll('.dot').forEach((d,i)=>{ if(i===currentSlide) d.classList.add('active'); else d.classList.remove('active'); }); }
    function nextSlide() { goToSlide((currentSlide+1)%totalSlides); }
    function startAuto() { if(autoInterval) clearInterval(autoInterval); autoInterval = setInterval(nextSlide, 4500); }
    function resetAuto() { if(autoInterval){ clearInterval(autoInterval); startAuto(); } }
    
    // মডাল
    const modal = document.getElementById('infoModal'), modalTitle = document.getElementById('modalTitle'), modalBodyDiv = document.getElementById('modalBody');
    function showPrivacy() { modalTitle.innerText = "গোপনীয়তা ও নীতি"; modalBodyDiv.innerHTML = `<p>📜 প্রতিটি বাটন আনলক করতে ২টি এড আবশ্যক।</p><p>🔒 কোন ব্যক্তিগত ডেটা সংরক্ষণ করা হয় না।</p><p>✅ এড শেষ হতেই লিংকে নিয়ে যাওয়া হবে।</p>`; modal.style.display = 'flex'; }
    function showAbout() { modalTitle.innerText = "📺 আমাদের সম্পর্কে"; modalBodyDiv.innerHTML = `<p>🎬 সিনেমা স্ট্রিম - আধুনিক ভিডিও পোর্টাল</p><p>⚠️ এড সম্পূর্ণ দেখুন, অন্যথায় কাউন্ট বাড়বেনা!</p><p>🔄 ট্রাফিক ৩টি লিংকে সমানভাবে বিতরণ হয়।</p>`; modal.style.display = 'flex'; }
    document.getElementById('privacyBtn').addEventListener('click', showPrivacy);
    document.getElementById('aboutBtn').addEventListener('click', showAbout);
    document.querySelector('.close-modal').addEventListener('click', () => modal.style.display = 'none');
    window.addEventListener('click', (e) => { if(e.target === modal) modal.style.display = 'none'; });
    
    function waitForAdsgram() {
        return new Promise((resolve) => {
            if(window.Adsgram) resolve(true);
            else { let attempts=0; const itv=setInterval(()=>{ if(window.Adsgram){ clearInterval(itv); resolve(true); } else if(attempts++>40){ clearInterval(itv); resolve(false); } }, 200); }
        });
    }
    
    async function init() {
        buildCarouselAndGrid();
        buildDotsAndSlider();
        const caro = document.querySelector('.carousel-container');
        if(caro) { caro.addEventListener('mouseenter',()=>{ if(autoInterval) clearInterval(autoInterval); }); caro.addEventListener('mouseleave', startAuto); }
        await waitForAdsgram();
        if(window.Adsgram) { mainAdController = initAdsgramController(ADSGRAM_BLOCK_ID); console.log("✅ এডসগ্রাম চালু"); }
        else showNotification("⚠️ বিজ্ঞাপন সিস্টেম লোড হয়নি! রিফ্রেশ করুন।", false);
    }
    init();
</script>
</body>
</html>
